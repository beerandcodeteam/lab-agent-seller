# Reverse proxy à frente do Sail (php artisan serve) para vector stores (RNF-06).
# client_max_body_size >= 512 MB deixa o upload atravessar o proxy e chegar à
# validação da aplicação antes de qualquer corte de infra.
server {
    listen 80;
    server_name _;

    client_max_body_size 512M;

    location / {
        proxy_pass http://laravel.test:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Uploads grandes (até 512 MB): não bufferizar em disco antes do upstream.
        proxy_request_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
